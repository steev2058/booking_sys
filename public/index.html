<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>خدمة حجز موعد - بنك البركة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--orange:#f57c00;--red:#c62828;--gray:#546e7a;--light:#f5f6f8;--card:#fff;--line:#d7dbe2;--ink:#263238}
    *{box-sizing:border-box}
    body{font-family:'Cairo',sans-serif;background:var(--light);margin:0;color:var(--ink)}
    .top{background:#fff;border-bottom:5px solid #2f2f2f}
    .top-in{max-width:1120px;margin:auto;display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
    .logo{height:52px}
    .service{background:linear-gradient(120deg,var(--orange),var(--red));color:#fff;padding:10px 18px;border-radius:0 0 0 26px;font-weight:800}

    .wrap{max-width:1120px;margin:18px auto;padding:0 14px}
    .hero{text-align:center;margin-bottom:12px}
    .hero h1{margin:0;font-size:34px;color:#3d4c53;font-weight:800}
    .hero p{margin:4px 0 0;color:#6b7c86;font-weight:700}

    .steps{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
    .step{padding:10px 14px;border-radius:12px;border:2px solid #c9cfd6;background:#fff;color:#596b76;font-weight:800}
    .step.active{background:linear-gradient(120deg,var(--orange),var(--red));border-color:transparent;color:#fff}

    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 10px 22px rgba(0,0,0,.05)}
    .section{display:none}.section.active{display:block}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    label{display:block;margin-bottom:5px;font-size:13px;font-weight:700;color:#485a64}
    input,select{width:100%;padding:12px;border:2px solid #cfd8dc;border-radius:12px;background:#fff;font-weight:700}
    input:focus,select:focus{outline:none;border-color:var(--orange)}

    .day-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .chip{padding:9px 14px;border:2px solid #b0bec5;border-radius:12px;background:#fff;cursor:pointer;font-weight:800;color:#546e7a}
    .chip.active{background:var(--gray);border-color:var(--gray);color:#fff}

    .slots{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:10px;margin-top:10px}
    .slot{padding:13px;border-radius:12px;border:2px solid #cfd8dc;background:#fff;cursor:pointer;font-weight:800;display:flex;justify-content:space-between}
    .slot.na{background:#ffe9e9;border-color:#ef9a9a;color:#a11d1d;cursor:not-allowed}
    .slot.sel{background:#eceff1;border-color:#90a4ae}

    .captcha-wrap{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:12px 0;padding:10px;border:1px dashed #d6c2c8;border-radius:12px;background:#fcf7f8}
    .captcha-img{height:84px;width:260px;border:1px solid #d4b0ba;border-radius:12px;background:#f2d5dc;display:block}
    .captcha-fallback{font-weight:800;color:#6d4c57}

    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    button{padding:10px 14px;border:0;border-radius:11px;background:linear-gradient(120deg,var(--orange),var(--red));color:#fff;font-weight:800;cursor:pointer}
    button.alt{background:#eceff1;color:#455a64}

    .msg{margin-top:10px;font-weight:800;min-height:22px}
    .footer{margin-top:12px;background:#455a64;color:#fff;text-align:center;padding:9px;border-radius:8px;font-weight:700}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:10000;padding:14px}
    .modal-box{width:100%;max-width:420px;background:#fff;border-radius:14px;border:1px solid #e2e2e2;box-shadow:0 18px 40px rgba(0,0,0,.2);padding:14px}
    .modal-title{font-weight:800;color:#455a64;margin-bottom:6px}
    .modal-text{color:#37474f;font-weight:700;margin-bottom:12px}
    .modal-actions{display:flex;gap:8px}
    .modal-actions button{flex:1}

    @media(max-width:900px){
      .grid{grid-template-columns:1fr}
      .slots{grid-template-columns:1fr}
      .hero h1{font-size:28px}
      .top-in{padding:8px 10px}
      .logo{height:42px}
      .service{padding:8px 12px;font-size:13px;border-radius:0 0 0 18px}
      .card{padding:12px}
      .steps{gap:6px}
      .step{font-size:12px;padding:8px 10px}
      .actions{flex-direction:column}
      .actions button,.actions input{width:100%;max-width:none!important}
      .captcha-wrap{flex-direction:column;align-items:stretch;padding:10px}
      .captcha-img{width:100%;max-width:100%}
      .captcha-fallback{padding:8px 10px;background:#f3e5e8;border-radius:10px;text-align:center}
    }
  </style>
</head>
<body>
  <div class="top"><div class="top-in"><img class="logo" src="/albaraka-logo.jpg" alt="logo"><div class="service">خدمة حجز موعد</div></div></div>
  <div class="wrap">
    <div class="hero"><h1>خدمة حجز موعد</h1><p>الرجاء اتباع الخطوات التالية لإتمام الحجز</p></div>

    <div class="steps">
      <div id="s1" class="step active" onclick="goStep(1)" style="cursor:pointer">1) بيانات الحوالة</div>
      <div id="s2" class="step" onclick="goStep(2)" style="cursor:pointer">2) اختيار اليوم والوقت</div>
      <div id="s3" class="step" onclick="goStep(3)" style="cursor:pointer">3) التحقق والتأكيد</div>
    </div>

    <div class="card">
      <div id="p1" class="section active">
        <div class="grid">
          <div><label>شركة الحوالات</label><select id="company"></select></div>
          <div><label>رقم الحوالة</label><input id="transfer" style="direction:ltr;text-align:left"></div>
          <div><label>رقم الهاتف</label><input id="phone" value="09" maxlength="10" inputmode="numeric" pattern="09[0-9]{8}" style="direction:ltr;text-align:left"></div>
          <div><label>الاسم الثلاثي</label><input id="full_name" placeholder="الاسم الثلاثي"></div>
          <div><label>الفرع</label><select id="branch"></select></div>
        </div>
        <div class="actions"><button onclick="nextStep(2)">التالي</button></div>
      </div>

      <div id="p2" class="section">
        <label>اختر اليوم</label>
        <div id="days" class="day-chips"></div>

        <label style="margin-top:12px">اختر الوقت</label>
        <div id="slots" class="slots"></div>

        <div class="actions"><button class="alt" onclick="nextStep(1)">رجوع</button><button onclick="nextStep(3)">التالي</button></div>
      </div>

      <div id="p3" class="section">
        <label>CAPTCHA</label>
        <div class="captcha-wrap">
          <img id="captchaImg" class="captcha-img" alt="captcha" onerror="this.style.display='none';captchaFallback.textContent='تعذر تحميل الصورة - اضغط تحديث';">
          <div id="captchaFallback" class="captcha-fallback"></div>
          <button class="alt" onclick="refreshCaptcha()">تحديث</button>
          <input id="captchaA" placeholder="ادخل الرمز في الصورة" style="max-width:240px;direction:ltr;text-align:left" inputmode="numeric">
        </div>

        <div class="actions">
          <button onclick="verifyCaptchaAndSendOtp()">تأكيد والتحقق من الكابتشا</button>
          <button class="alt" onclick="nextStep(2)">رجوع</button>
        </div>
      </div>

      <div id="msg" class="msg"></div>
    </div>
    <div class="footer">جميع الحقوق محفوظة لبنك البركة © 2026</div>
  </div>
  
  <div id="otpModal" class="modal-backdrop">
    <div class="modal-box" style="max-width:380px">
      <div class="modal-title">إدخال رمز OTP</div>
      <div class="modal-text">أدخل رمز 4 خانات المرسل إلى هاتفك</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:10px;direction:ltr">
        <input id="o1" maxlength="1" inputmode="numeric" style="width:54px;text-align:center;font-size:24px">
        <input id="o2" maxlength="1" inputmode="numeric" style="width:54px;text-align:center;font-size:24px">
        <input id="o3" maxlength="1" inputmode="numeric" style="width:54px;text-align:center;font-size:24px">
        <input id="o4" maxlength="1" inputmode="numeric" style="width:54px;text-align:center;font-size:24px">
      </div>
      <div class="modal-actions">
        <button class="alt" id="otpCancel" type="button">إلغاء</button>
        <button id="otpConfirm" type="button">تأكيد الحجز</button>
      </div>
    </div>
  </div>

  <div id="toast" style="position:fixed;left:16px;bottom:16px;background:#263238;color:#fff;padding:10px 14px;border-radius:10px;font-weight:700;display:none;z-index:9999"></div>
  <div id="confirmModal" class="modal-backdrop">
    <div class="modal-box">
      <div class="modal-title">تأكيد العملية</div>
      <div id="confirmText" class="modal-text">هل تريد المتابعة؟</div>
      <div class="modal-actions">
        <button id="confirmNo" class="alt" type="button">إلغاء</button>
        <button id="confirmYes" type="button">تأكيد</button>
      </div>
    </div>
  </div>

<script>
let captchaToken='',selectedSlot='',selectedDate='',daysConfig=[],step=1,bookingEnabled=true;
const setStep=()=>{['p1','p2','p3'].forEach((x,i)=>document.getElementById(x).classList.toggle('active',i+1===step));['s1','s2','s3'].forEach((x,i)=>document.getElementById(x).classList.toggle('active',i+1===step));}
function goStep(n){if(n===2||n===3){nextStep(n);return;}step=n;setStep();}
function showToast(text, ok=true){const t=document.getElementById('toast');t.textContent=text;t.style.background=ok?'#1b5e20':'#b00020';t.style.display='block';clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>t.style.display='none',2500)}
function confirmAction(text){return new Promise((resolve)=>{const m=document.getElementById('confirmModal');document.getElementById('confirmText').textContent=text;m.style.display='flex';document.getElementById('confirmYes').onclick=()=>{m.style.display='none';resolve(true)};document.getElementById('confirmNo').onclick=()=>{m.style.display='none';resolve(false)};});}
function clearMsg(){msg.textContent='';}
function sanitizePhone(v){let d=String(v||'').replace(/\D/g,'');if(!d.startsWith('09')) d='09'+d.replace(/^0+/,'');d=d.slice(0,10);if(d.length<2)d='09';return d;}
function sanitizeName(v){return String(v||'').replace(/[^A-Za-z\u0600-\u06FF\s]/g,'').replace(/\s{2,}/g,' ').trimStart();}
function isValidName(v){return /^[A-Za-z\u0600-\u06FF\s]{3,}$/.test(String(v||'').trim());}

function setBookingEnabled(enabled){
  bookingEnabled=!!enabled;
  document.querySelectorAll('.card input, .card select, .card button').forEach(el=>{
    if(el.id==='msg') return;
    el.disabled=!enabled;
  });
  if(!enabled){
    msg.style.color='#b00020';
    msg.textContent='تم إيقاف الحجز حالياً لعدم توفر شركات حوالات فعالة.';
    showToast('لا يمكن متابعة الحجز حالياً لعدم توفر شركات حوالات', false);
  }else{
    clearMsg();
  }
}
function nextStep(n){if(!bookingEnabled){showToast('الحجز متوقف حالياً لعدم توفر شركات حوالات',false);return;}const transferVal=String(document.getElementById('transfer').value||'').trim();const phoneVal=String(document.getElementById('phone').value||'').trim();const fullNameVal=String(document.getElementById('full_name').value||'').trim();if(n===2&&(!transferVal||!phoneVal||!fullNameVal)){msg.style.color='#b00020';msg.textContent='يرجى تعبئة رقم الحوالة والهاتف والاسم الثلاثي';showToast('يرجى تعبئة رقم الحوالة والهاتف والاسم الثلاثي',false);return;}if(n===2&&!/^09\d{8}$/.test(phoneVal)){msg.style.color='#b00020';msg.textContent='رقم الهاتف يجب أن يبدأ بـ 09 ويتكون من 10 أرقام';showToast('رقم الهاتف يجب أن يبدأ بـ 09 ويتكون من 10 أرقام',false);return;}if(n===2&&!isValidName(fullNameVal)){msg.style.color='#b00020';msg.textContent='الاسم يجب أن يحتوي محارف فقط بدون أرقام';showToast('الاسم يجب أن يحتوي محارف فقط بدون أرقام',false);return;}if(n===3&&!selectedSlot){msg.style.color='#b00020';msg.textContent='الرجاء اختيار وقت متاح';showToast('الرجاء اختيار وقت متاح',false);return;}clearMsg();step=n;setStep();}
async function j(url, options){const r=await fetch(url, options);return await r.json();}
async function refreshCaptcha(){
  const cap=await j('/api/captcha');
  captchaToken=cap.token;
  if(cap.image){
    captchaImg.style.display='block';
    captchaImg.src=cap.image;
    captchaFallback.textContent='';
  }else{
    captchaImg.style.display='none';
    captchaFallback.textContent=cap.challenge||'CAPTCHA';
  }
}
async function init(){phone.value='09';const b=await j('/api/branches');branch.innerHTML=b.branches.map(x=>`<option value="${x.id}">${x.name} - ${x.location}</option>`).join('');const c=await j('/api/companies');const companies=(c.companies||[]);company.innerHTML=companies.map(x=>`<option value="${x.id}">${x.name}${x.description?` - ${x.description}`:''}</option>`).join('');if(!companies.length){setBookingEnabled(false);return;}setBookingEnabled(true);await refreshCaptcha();await loadDays();}
async function loadDays(){const d=await j('/api/business-days?branch_id='+branch.value);daysConfig=d.days||[];selectedDate='';days.innerHTML=daysConfig.map((x,i)=>`<div class="chip ${i===0?'active':''}" data-date="${x.date}">${x.day_name_ar} (${x.date})</div>`).join('');if(daysConfig[0])selectedDate=daysConfig[0].date;document.querySelectorAll('.chip').forEach(el=>el.onclick=()=>{document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');selectedDate=el.dataset.date;loadSlots();});await loadSlots();}
async function loadSlots(){selectedSlot='';if(!selectedDate){slots.innerHTML='';return;}const s=await j(`/api/slots?branch_id=${branch.value}&booking_date=${encodeURIComponent(selectedDate)}`);slots.innerHTML=(s.slots||[]).map(x=>`<div class="slot ${x.available?'':'na'}" data-time="${x.time}"><span>⏱</span><span>${x.time} - ${x.to_time}${x.available?'':` (ممتلئة)`}</span></div>`).join('');document.querySelectorAll('.slot:not(.na)').forEach(el=>el.onclick=()=>{document.querySelectorAll('.slot').forEach(a=>a.classList.remove('sel'));el.classList.add('sel');selectedSlot=el.dataset.time;});}
branch.onchange=loadDays;
document.getElementById('transfer').addEventListener('input',clearMsg);
document.getElementById('phone').addEventListener('input',e=>{e.target.value=sanitizePhone(e.target.value);clearMsg();});
document.getElementById('phone').addEventListener('keydown',e=>{if(['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Home','End'].includes(e.key))return;if(!/\d/.test(e.key))e.preventDefault();if((e.target.selectionStart||0)<2)e.preventDefault();});
document.getElementById('full_name').addEventListener('input',e=>{e.target.value=sanitizeName(e.target.value);clearMsg();});
function getOtpCode(){return [o1.value,o2.value,o3.value,o4.value].join('');}
function openOtpModal(){otpModal.style.display='flex';[o1,o2,o3,o4].forEach((el,i)=>{el.value='';el.oninput=()=>{el.value=(el.value||'').replace(/\D/g,'').slice(0,1);if(el.value&&i<3)[o1,o2,o3,o4][i+1].focus();};});o1.focus();}
otpCancel.onclick=()=>{otpModal.style.display='none';};

async function verifyCaptchaAndSendOtp(){if(!bookingEnabled){showToast('الحجز متوقف حالياً لعدم توفر شركات حوالات',false);return;}const phoneVal=String(document.getElementById('phone').value||'').trim();const transferVal=String(document.getElementById('transfer').value||'').trim();const fullNameVal=String(document.getElementById('full_name').value||'').trim();if(!/^09\d{8}$/.test(phoneVal)){showToast('رقم الهاتف يجب أن يبدأ بـ 09 ويتكون من 10 أرقام',false);msg.style.color='#b00020';msg.textContent='رقم الهاتف يجب أن يبدأ بـ 09 ويتكون من 10 أرقام';return;}if(!isValidName(fullNameVal)){showToast('الاسم يجب أن يحتوي محارف فقط بدون أرقام',false);msg.style.color='#b00020';msg.textContent='الاسم يجب أن يحتوي محارف فقط بدون أرقام';return;}const r=await j('/api/send-otp',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({phone:phoneVal,full_name:fullNameVal,transfer_number:transferVal,captcha_answer:captchaA.value,captcha_token:captchaToken})});msg.style.color=r.ok?'#1b5e20':'#b00020';msg.textContent=r.message||r.error||'خطأ غير متوقع';showToast(r.message||r.error||'خطأ غير متوقع',!!r.ok);if(!r.ok){await refreshCaptcha();return;}openOtpModal();}

otpConfirm.onclick=async()=>{if(!bookingEnabled){showToast('الحجز متوقف حالياً لعدم توفر شركات حوالات',false);return;}const code=getOtpCode();if(!/^\d{4}$/.test(code)){showToast('أدخل رمز OTP من 4 أرقام',false);return;}const transferVal=String(document.getElementById('transfer').value||'').trim();const phoneVal=String(document.getElementById('phone').value||'').trim();const fullNameVal=String(document.getElementById('full_name').value||'').trim();const r=await j('/api/book',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({transfer_number:transferVal,branch_id:branch.value,company_id:company.value,booking_date:selectedDate,slot_time:selectedSlot,phone:phoneVal,full_name:fullNameVal,otp_code:code})});msg.style.color=r.success?'#1b5e20':'#b00020';msg.textContent=r.message||r.error||'خطأ غير متوقع';showToast(r.message||r.error||'خطأ غير متوقع',!!r.success);if(r.success){otpModal.style.display='none';await loadSlots();step=1;setStep();await refreshCaptcha();}};

init();
</script>
</body>
</html>
